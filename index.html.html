        function enterApp() {
            currentLang = document.getElementById('lang-picker').value;
            applyLanguage();
            document.getElementById('splash').style.display = 'none';
        }

        function applyLanguage() {
            const data = langData[currentLang] || langData.en;
            document.getElementById('app-title').innerText = data.title;
            document.getElementById('label-home').innerText = data.home;
            document.getElementById('label-live').innerText = data.live;
            
            const container = document.getElementById('facts-container');
            container.innerHTML = '';
            
            data.facts.forEach((f, i) => {
                container.innerHTML += `
                    <div class="fact-card">
                        <div class="fact-content">
                            <h4>${f.t}</h4>
                            <p>${f.d}</p>
                        </div>
                        <img src="${factImgs[i]}" class="fact-img">
                    </div>`;
            });
        }

        function changeTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-page').classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active');
        }

        function performSync() {
            const syncScreen = document.getElementById('sync-screen');
            const bar = document.getElementById('sync-progress');
            const label = document.getElementById('sync-label');
            syncScreen.style.display = 'flex';
            label.innerText = langData[currentLang].sync;
            
            let progress = 0;
            const iv = setInterval(() => {
                progress += 5;
                bar.style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(iv);
                    setTimeout(() => {
                        syncScreen.style.display = 'none';
                        startLiveFeed();
                    }, 400);
                }
            }, 100);
        }

        function startLiveFeed() {
            document.getElementById('trans-init').style.display = 'none';
            document.getElementById('live-content').style.display = 'block';
            const feed = document.getElementById('script-feed');
            feed.innerHTML = '';
            const script = langData[currentLang]?.script || langData.en.script;
            
            script.forEach((item, index) => {
                const el = document.createElement('div');
                el.id = 'line-' + index;
                el.className = item.s ? 'stage-note' : 'line';
                el.innerText = item.s || item.m;
                feed.appendChild(el);
            });

            let startTime = Date.now();
            setInterval(() => {
                let elapsed = (Date.now() - startTime) / 1000;
                script.forEach((item, index) => {
                    if (elapsed >= item.t) {
                        const lineEl = document.getElementById('line-' + index);
                        if (lineEl && !lineEl.classList.contains('active')) {
                            document.querySelectorAll('.line, .stage-note').forEach(l => l.classList.remove('active'));
                            lineEl.classList.add('active');
                            if (item.m) {
                                let speech = new SpeechSynthesisUtterance(item.m);
                                if (currentLang === 'zh') speech.lang = 'zh-CN';
                                else if (currentLang === 'vn') speech.lang = 'vi-VN';
                                else if (currentLang === 'ja') speech.lang = 'ja-JP';
                                else if (currentLang === 'ko') speech.lang = 'ko-KR';
                                else speech.lang = currentLang;
                                window.speechSynthesis.speak(speech);
                            }
                        }
                    }
                });
            }, 500);
        }
    </script>
