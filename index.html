                    {t:"4. Màn Tre", d:"Thông thường, đó là một tấm chiếu hoặc tấm ván đan bằng tre, đủ chắc chắn để che giấu chuyển động nhưng đủ nhẹ để hòa hợp tự nhiên với khung cảnh mộc mạc. Những tấm chắn này được sử dụng để che giấu chuyển động của người điều khiển rối, cho phép họ điều khiển các con rối một cách kín đáo. Chúng được đặt ở phía trước sân khấu nước, thường được trang trí bằng các họa tiết và được sơn để giống với mặt tiền của một ngôi đền."},
                    {t:"5. Âm Nhạc Truyền Thống", d:"Nhạc sống được trình diễn với trống và nhạc cụ dây truyền thống đóng vai trò quan trọng trong buổi biểu diễn, làm tăng thêm tính nghệ thuật kể chuyện bằng cách tạo không khí, nhấn mạnh những khoảnh khắc quan trọng và dẫn dắt nhịp điệu của từng cảnh. Nhịp điệu và giai điệu giúp truyền tải cảm xúc, báo hiệu hành động của nhân vật và đưa khán giả đắm chìm sâu hơn vào câu chuyện văn hóa, ngay cả khi không hiểu ngôn ngữ."},
                    {t:"6. Truyện Dân Gian", d:"Các tiết mục biểu diễn tái hiện văn hóa dân gian truyền thống Việt Nam, bao gồm truyền thuyết làng quê, cảnh sinh hoạt thường nhật ở nông thôn và những câu chuyện lịch sử. Những câu chuyện này thường phản ánh các giá trị văn hóa, tín ngưỡng và sự hài hước, giúp khán giả hiểu thêm về di sản, phong tục tập quán và lối sống của Việt Nam thông qua cách kể chuyện hấp dẫn và giàu tính biểu tượng."},
                    {t:"7. Rối Chạm Khắc", d:"Mỗi con rối đều được các nghệ nhân lành nghề chạm khắc và vẽ tay tỉ mỉ, thể hiện sự khéo léo và kỹ thuật truyền thống tinh xảo. Những hình tượng được thiết kế độc đáo này đại diện cho các nhân vật và vai trò khác nhau, giúp truyền tải trực quan cá tính, cảm xúc và biểu tượng văn hóa trong buổi biểu diễn."},
                    {t:"8. Sơn Phủ", d:"Những con rối được phủ nhiều lớp sơn mài, không chỉ mang lại vẻ ngoài mịn màng, bóng bẩy mà còn bảo vệ chúng khỏi hư hại do nước trong quá trình biểu diễn. Kỹ thuật hoàn thiện này giúp tăng độ bền đồng thời tạo nên vẻ ngoài rực rỡ, bóng bẩy, khiến những con rối trở nên nổi bật hơn trên sân khấu."},
                    {t:"9. Diễn Dưới Nước", d:"Vở diễn được thực hiện bởi một nhóm nghệ sĩ múa rối làm việc phối hợp chặt chẽ phía sau sân khấu, cẩn thận đồng bộ hóa các chuyển động để điều khiển các con rối một cách mượt mà. Tinh thần đồng đội này cho phép tạo ra những cảnh phức tạp, tương tác sống động và kể chuyện liền mạch, thể hiện cả kỹ năng kỹ thuật và nghệ thuật tập thể."},
                    {t:"10. Di Sản Văn Hóa", d:"Múa rối nước Việt Nam là một loại hình nghệ thuật truyền thống được lưu truyền qua nhiều thế hệ, bảo tồn những câu chuyện, giá trị và kỹ thuật thủ công bắt nguồn từ đời sống nông thôn. Nó phản ánh lịch sử và bản sắc dân tộc, khiến mỗi buổi biểu diễn không chỉ đơn thuần là giải trí mà còn là sự thể hiện ý nghĩa về di sản văn hóa Việt Nam."}
],

            zh: {
		homeIntroTitle: "什么是水上木偶戏？",
		homeIntroDesc: "水上木偶戏是越南的一种传统艺术形式，表演者在水面上操控木偶，通常是在一个浅水池中，水池就充当了舞台。木偶由隐藏在幕布后的操纵者控制，他们用水下的长杆和绳索来移动木偶。",
		soundHint: "建议开启声音体验 🎧",

                home: "首页", live: "同步剧本", sync: "同步中...", title: "升龙水上木偶",
                facts: [
                    {t:"1. 水上舞台", d:"水上舞台既是表演场地，也是水上木偶戏的功能性遮蔽系统。舞台通常设在浅水池中，模拟越南的自然景观，例如河流、池塘或稻田。舞台中央矗立着“水亭”（水上凉亭），这座装饰华丽的建筑既是舞台背景，又能将木偶师隐藏在其后。水扮演着至关重要的双重角色：它隐藏了水面下错综复杂的杆线系统，并通过倒影、涟漪和水花增强了视觉效果。此外，水的浮力支撑着木偶的重量，使其能够做出流畅的动作，例如滑行、旋转和突然出现，从而将舞台本身变成一个活跃的叙事元素，兼具功能性和视觉吸引力。"},
                    {t:"2. 隐藏的工匠", d:"水上木偶师在水亭内，躲在竹帘后操控着木偶，隐匿于水中。他们潜入水中，操作着一套精巧的水下杆线系统。凭借丰富的经验和敏锐的直觉，他们感知着水的阻力和音乐的节奏，赋予木偶生命，创造出栩栩如生的动作，巧妙地掩盖了人手的痕迹。"},
					{t:"3. 无花果木", d:"菠萝蜜因其高耐久性、轻便性和优异的防水性，成为水上木偶制作的首选材料。它尺寸稳定性极佳，不易变形和白蚁侵蚀，并拥有天然亮丽的黄色。此外，其细腻的纹理使其能够进行精细的雕刻，使工匠们能够制作出细节精致流畅、即使在潮湿环境中也能保持完好的木偶。"},
                    {t:"4. 竹帘", d:"通常情况下，这些屏风是用竹子编织的席子或板子，既足够坚固以遮挡动作，又足够轻便以自然地融入质朴的环境。这些屏风用于隐藏木偶师的动作，使他们能够悄无声息地操控木偶。它们被放置在水上舞台的前方，通常装饰有各种图案，并被涂成类似寺庙外墙的样子。"},
                    {t:"5. 传统音乐", d:"现场演奏的传统鼓乐和弦乐器在演出中扮演着至关重要的角色，它们通过营造氛围、强调关键时刻和引导每个场景的节奏，增强了故事的叙述效果。节奏和旋律有助于传递情感、暗示人物行为，并使观众即使不懂语言也能更深入地沉浸在文化叙事中。"},
                    {t:"6. 民间故事", d:"这些演出展现了越南传统民间故事，包括乡村传说、乡村日常生活场景和历史故事。这些故事往往反映了文化价值观、信仰和幽默，让观众通过引人入胜、寓意深刻的叙事方式，深入了解越南的文化遗产、社会习俗和生活方式。"},
                    {t:"7. 手工木偶", d:"每个木偶都由技艺精湛的工匠精心雕刻和手工绘制，展现了精湛的工艺和传统技法。这些设计独特的木偶代表着不同的角色，有助于在表演中生动地传达人物个性、情感和文化象征意义。"},
                    {t:"8. 漆面涂层", d:"这些木偶表面涂有多层漆，不仅使其外观光滑亮泽，还能在演出过程中保护它们免受水渍损害。这种表面处理工艺增强了木偶的耐用性，同时赋予它们鲜艳夺目的光泽，使它们在舞台上更具视觉冲击力。"},
                    {t:"9. 水中表演", d:"这场演出由一群在后台密切配合的木偶师表演，他们精心同步动作，使木偶的操控流畅自如。这种团队合作使得复杂的场景、动态的互动和流畅的故事叙述成为可能，充分展现了精湛的技艺和集体的艺术才华。"},
                    {t:"10. 文化遗产", d:"越南水上木偶戏是一种代代相传的传统艺术形式，它保存着植根于乡村生活的故事、价值观和工艺。它反映了越南的历史和民族特性，使每一场演出不仅仅是娱乐，更是越南文化遗产的深刻表达。"}
],

            fr: {
		homeIntroTitle: "Qu'est-ce que le théâtre de marionnettes sur l’eau ?",
		homeIntroDesc: "Le théâtre de marionnettes sur l'eau est un art traditionnel vietnamien où des marionnettes sont manipulées sur l'eau, généralement dans un bassin peu profond servant de scène. Les marionnettes sont actionnées par des marionnettistes cachés derrière un écran, à l'aide de longues tiges et de ficelles immergées.",
		soundHint: "Meilleure expérience avec le son 🎧",

                home: "ACCUEIL", live: "DIRECT", sync: "SYNCHRO...", title: "MARIONNETTES",
                facts: [
                    {t:"1. Scène d’Eau", d:"La scène aquatique sert à la fois d'espace scénique et de système de dissimulation fonctionnel pour les marionnettes sur l'eau. Elle est généralement installée dans un bassin peu profond représentant des paysages naturels vietnamiens tels que des rivières, des étangs ou des rizières. En son centre se dresse le « Thuy Dinh » (pavillon d'eau), une structure ornée qui sert de décor tout en dissimulant les marionnettistes. L'eau joue un double rôle crucial : elle masque le système complexe de tiges et de fils sous la surface tout en sublimant la performance visuelle par des reflets, des ondulations et des éclaboussures. De plus, elle soutient le poids des marionnettes par flottabilité, permettant des mouvements fluides tels que des glissements, des pirouettes et des apparitions soudaines, transformant ainsi la scène elle-même en un élément narratif vivant, à la fois fonctionnel et visuellement captivant."},
                    {t:"2. Artisans Cachés", d:"Dans le pavillon aquatique, des marionnettistes manipulent les personnages de manière invisible, dissimulés derrière un écran de bambou. Immergés dans l'eau, ils actionnent un système sophistiqué de perches et de fils. Leur performance repose sur une intuition aiguisée : ils perçoivent la résistance de l'eau et les rythmes de la musique pour donner vie aux marionnettes et créer des mouvements d'un réalisme saisissant, masquant ainsi la main humaine."},
                    {t:"3. Bois de Figuier", d:"Le bois de jacquier (Artocarpus heterophyllus) est le matériau de prédilection pour les marionnettes sur l'eau grâce à sa grande durabilité, sa légèreté et son excellente résistance à l'eau. Il est particulièrement stable dimensionnellement, résistant à la déformation et aux termites, et possède une teinte jaune vif naturellement esthétique. De plus, son grain fin permet une sculpture minutieuse, offrant aux artisans la possibilité de créer des marionnettes aux détails exquis et fluides qui conservent leur robustesse malgré une exposition prolongée à l'humidité."},
                    {t:"4. Rideau en bambou", d:"Il s'agit généralement d'une natte ou d'un panneau en bambou tressé, suffisamment robuste pour dissimuler les mouvements, mais assez léger pour se fondre naturellement dans le décor rustique. Ces paravents servent à masquer les gestes du marionnettiste, lui permettant ainsi de manipuler les marionnettes discrètement. Placés à l'avant de la scène aquatique, ils sont souvent ornés de motifs et peints pour imiter la façade d'un temple."},
                    {t:"5. Musique Traditionnelle", d:"La musique jouée en direct avec des percussions et des instruments à cordes traditionnels joue un rôle essentiel dans la représentation, enrichissant le récit par la création de l'ambiance, la mise en valeur des moments clés et le rythme de chaque scène. Les rythmes et les mélodies contribuent à transmettre les émotions, à signaler les actions des personnages et à immerger davantage le public dans le récit culturel, même sans comprendre la langue."},
                    {t:"6. Histoires Folkloriques", d:"Les spectacles mettent en scène le folklore traditionnel vietnamien, notamment des légendes villageoises, des scènes de la vie rurale quotidienne et des récits historiques. Ces histoires reflètent souvent les valeurs culturelles, les croyances et l'humour, permettant au public de mieux comprendre le patrimoine, les coutumes sociales et le mode de vie vietnamiens grâce à une narration captivante et symbolique."},
                    {t:"7. Marionnettes Sculptées", d:"Chaque marionnette est minutieusement sculptée et peinte à la main par des artisans qualifiés, témoignant d'un savoir-faire exceptionnel et de techniques traditionnelles. Ces figurines uniques représentent différents personnages et rôles, contribuant à exprimer visuellement la personnalité, les émotions et le symbolisme culturel au sein du spectacle."},
                    {t:"8. Finition Laquée", d:"Les marionnettes sont recouvertes de plusieurs couches de laque, ce qui leur confère un aspect lisse et brillant tout en les protégeant des dégâts d'eau pendant les représentations. Cette technique de finition renforce leur durabilité et leur donne un aspect éclatant et soigné, les rendant ainsi plus impressionnantes sur scène."},
                    {t:"9. Performance dans l’Eau", d:"Le spectacle est interprété par une équipe de marionnettistes travaillant en étroite collaboration en coulisses, synchronisant soigneusement leurs mouvements pour une manipulation fluide des marionnettes. Ce travail d'équipe permet des scènes complexes, des interactions dynamiques et une narration sans faille, témoignant à la fois d'une grande maîtrise technique et d'un talent artistique collectif."},
                    {t:"10. Patrimoine Culturel", d:"Le théâtre de marionnettes sur l'eau vietnamien est un art traditionnel transmis de génération en génération, qui préserve les récits, les valeurs et le savoir-faire ancrés dans la vie rurale. Reflet de l'histoire et de l'identité du pays, chaque représentation est bien plus qu'un simple divertissement : c'est une expression profonde du patrimoine culturel vietnamien."}
],

            es: {
		homeIntroTitle: "¿Qué es el teatro de marionetas acuáticas?",
		homeIntroDesc: "El teatro de marionetas acuáticas es una forma de arte tradicional vietnamita en la que las marionetas se representan sobre el agua, generalmente en una piscina poco profunda que sirve de escenario. Las marionetas son controladas por titiriteros ocultos tras una pantalla, que utilizan largas varillas e hilos bajo el agua para moverlas.",
		soundHint: "Se recomienda usar sonido 🎧",

                home: "INICIO", live: "GUIÓN", sync: "SINCRO...", title: "MARIONETAS",
                facts: [
                    {t:"1. Escenario de Agua", d:"El escenario acuático sirve tanto de espacio escénico como de sistema de ocultación funcional para el teatro de marionetas acuáticas, generalmente ubicado en una piscina poco profunda que representa paisajes naturales vietnamitas como ríos, estanques o arrozales. En su centro se alza el Thuy Dinh (pabellón acuático), una estructura ornamentada que actúa como telón de fondo y oculta a los titiriteros tras ella. El agua desempeña un doble papel crucial: oculta el intrincado sistema de varillas e hilos bajo la superficie, a la vez que realza la representación visual mediante reflejos, ondas y salpicaduras. Además, soporta el peso de las marionetas gracias a su flotabilidad, permitiendo movimientos fluidos como deslizamientos, giros y apariciones repentinas, transformando el escenario en un elemento narrativo activo, funcional y visualmente atractivo."},
                    {t:"2. Artesanos Ocultos", d:"Los titiriteros acuáticos manipulan las figuras de forma invisible desde detrás de una pantalla de bambú dentro del pabellón acuático. Sumergidos en el agua, manejan un sofisticado sistema subacuático de postes e hilos. Su actuación se basa en una intuición experimentada, percibiendo la resistencia del agua y los ritmos de la música para dar vida a las marionetas, creando movimientos realistas que disimulan la intervención humana."},
                    {t:"3. Madera de Higuera", d:"La madera de jackwood (Artocarpus heterophyllus) es el material preferido para la creación de títeres acuáticos debido a su alta durabilidad, ligereza y excelente resistencia al agua. Es notablemente estable dimensionalmente, resistente a la deformación y a la infestación de termitas, y posee un atractivo tono amarillo brillante natural. Además, su grano fino permite tallas intrincadas, lo que posibilita a los artesanos crear títeres con detalles exquisitos y fluidos que se mantienen resistentes a pesar de la exposición continua a ambientes húmedos."},
                    {t:"4. Cortina de bambú", d:"Generalmente se trata de una estera o panel de bambú tejido, lo suficientemente resistente como para ocultar el movimiento, pero lo suficientemente ligero como para integrarse de forma natural en el entorno rústico. Estas pantallas se utilizan para ocultar los movimientos del titiritero, permitiéndole manipular las marionetas con discreción. Se colocan en la parte delantera del escenario acuático, a menudo decoradas con motivos y pintadas para imitar la fachada de un templo."},
                    {t:"5. Música Tradicional", d:"La música en vivo, interpretada con tambores e instrumentos de cuerda tradicionales, desempeña un papel crucial en la representación, enriqueciendo la narración al crear la atmósfera adecuada, enfatizar los momentos clave y marcar el ritmo de cada escena. Los ritmos y las melodías ayudan a transmitir emociones, señalar las acciones de los personajes e sumergir al público más profundamente en la narrativa cultural, incluso sin comprender el idioma."},
                    {t:"6. Historias Folclóricas", d:"Las representaciones muestran el folclore tradicional vietnamita, incluyendo leyendas de aldea, escenas de la vida rural cotidiana y relatos históricos. Estas historias a menudo reflejan valores culturales, creencias y humor, lo que permite al público comprender el patrimonio, las costumbres sociales y el modo de vida de Vietnam a través de narraciones atractivas y simbólicas."},
                    {t:"7. Marionetas Talladas", d:"Cada títere está meticulosamente tallado y pintado a mano por hábiles artesanos, lo que demuestra la exquisitez de su elaboración y las técnicas tradicionales. Estas figuras de diseño único representan diferentes personajes y roles, contribuyendo a transmitir visualmente la personalidad, la emoción y el simbolismo cultural de la representación."},
                    {t:"8. Acabado Lacado", d:"Las marionetas están recubiertas con múltiples capas de laca, lo que no solo les da una apariencia lisa y brillante, sino que también las protege de los daños causados ​​por el agua durante las representaciones. Esta técnica de acabado mejora la durabilidad a la vez que les confiere un aspecto vibrante y pulido que hace que las marionetas sean más llamativas visualmente en el escenario."},
                    {t:"9. Actuación en el Agua", d:"El espectáculo es interpretado por un equipo de titiriteros que trabajan en estrecha coordinación tras el escenario, sincronizando cuidadosamente los movimientos para controlar las marionetas con fluidez. Este trabajo en equipo permite escenas complejas, interacciones dinámicas y una narración impecable, demostrando tanto la destreza técnica como el talento artístico colectivo."},
                    {t:"10. Patrimonio Cultural", d:"El teatro de marionetas acuáticas vietnamita es una forma de arte tradicional que se ha transmitido de generación en generación, preservando historias, valores y artesanía arraigados en la vida rural. Refleja la historia y la identidad del país, haciendo que cada representación no sea solo entretenimiento, sino una expresión significativa del patrimonio cultural de Vietnam."}
],

            de: {
		homeIntroTitle: "Was ist Wasserpuppenspiel?",
		homeIntroDesc: "Das Wasserpuppenspiel ist eine traditionelle vietnamesische Kunstform, bei der Puppen auf dem Wasser, meist in einem flachen Becken, das als Bühne dient, aufgeführt werden. Die Puppen werden von Puppenspielern hinter einem Sichtschutz mithilfe langer Stäbe und Schnüre unter Wasser bewegt.",
		soundHint: "Am besten mit Ton erleben 🎧",

                home: "START", live: "SKRIPT", sync: "SYNC...", title: "WASSERPUPPEN",
                facts: [
                    {t:"1. Wasserbühne", d:"Die Wasserbühne dient sowohl als Aufführungsfläche als auch als funktionales Tarnsystem für das Wasserpuppenspiel. Sie befindet sich typischerweise in einem flachen Becken, das natürliche vietnamesische Landschaften wie Flüsse, Teiche oder Reisfelder darstellt. In ihrer Mitte steht der „Thuy Dinh“ (Wasserpavillon), ein kunstvoll gestaltetes Bauwerk, das als Kulisse dient und gleichzeitig die Puppenspieler verbirgt. Das Wasser erfüllt eine entscheidende Doppelfunktion: Es verbirgt das komplexe System aus Stäben und Fäden unter der Oberfläche und verstärkt gleichzeitig die visuelle Wirkung durch Spiegelungen, Wellen und Spritzer. Darüber hinaus trägt es durch seinen Auftrieb das Gewicht der Puppen und ermöglicht so fließende Bewegungen wie Gleiten, Drehen und plötzliches Erscheinen. Dadurch wird die Bühne selbst zu einem aktiven Erzählelement, das sowohl funktional als auch visuell ansprechend ist."},
                    {t:"2. Verborgene Handwerker", d:"Die Wasserpuppenspieler bewegen die Figuren unsichtbar hinter einer Bambuswand im Wasserpavillon. Im Wasser bedienen sie ein ausgeklügeltes Unterwassersystem aus Stangen und Schnüren. Ihre Darbietung beruht auf geübter Intuition; sie spüren den Wasserwiderstand und die rhythmischen Signale der Musik, um den Puppen Leben einzuhauchen und lebensechte Bewegungen zu erzeugen, die die menschliche Hand kaschieren."},
                    {t:"3. Feigenholz", d:"Jackholz (Artocarpus heterophyllus) ist aufgrund seiner hohen Haltbarkeit, seines geringen Gewichts und seiner ausgezeichneten Wasserbeständigkeit das bevorzugte Material für Wasserpuppenspiele. Es ist besonders formstabil, verzugsfrei und resistent gegen Termitenbefall und besitzt einen natürlich ästhetischen, hellgelben Farbton. Darüber hinaus ermöglicht seine feine Maserung aufwendige Schnitzereien, sodass Kunsthandwerker Puppen mit exquisiten, fließenden Details herstellen können, die auch bei ständiger Einwirkung von Feuchtigkeit ihre Form behalten."},
                    {t:"4. Bambusvorhang", d:"Typischerweise handelt es sich um gewebte Bambusmatten oder -paneele, die robust genug sind, um Bewegungen zu verbergen, aber gleichzeitig leicht genug, um sich harmonisch in die rustikale Umgebung einzufügen. Diese Schirme dienen dazu, die Bewegungen des Puppenspielers zu verbergen und ihm so ein diskretes Manövrieren der Puppen zu ermöglichen. Sie befinden sich am vorderen Rand der Wasserbühne und sind oft mit Motiven verziert und so bemalt, dass sie einer Tempelfassade ähneln."},
                    {t:"5. Traditionelle Musik", d:"Live-Musik, gespielt mit traditionellen Trommeln und Saiteninstrumenten, spielt eine entscheidende Rolle in der Aufführung. Sie verstärkt die Erzählung, indem sie die Stimmung setzt, Schlüsselmomente hervorhebt und den Rhythmus jeder Szene vorgibt. Rhythmen und Melodien helfen, Emotionen zu vermitteln, Handlungen der Figuren zu signalisieren und das Publikum tiefer in die kulturelle Erzählung eintauchen zu lassen, selbst ohne die Sprache zu verstehen."},
                    {t:"6. Volksgeschichten", d:"Die Aufführungen zeigen traditionelle vietnamesische Folklore, darunter Dorflegenden, Szenen aus dem ländlichen Alltag und historische Erzählungen. Diese Geschichten spiegeln oft kulturelle Werte, Glaubensvorstellungen und Humor wider und ermöglichen dem Publikum durch fesselndes und symbolträchtiges Storytelling Einblicke in Vietnams Erbe, soziale Bräuche und Lebensweise."},
                    {t:"7. Handgeschnitzte Figuren", d:"Jede Puppe wird von erfahrenen Kunsthandwerkern sorgfältig geschnitzt und handbemalt und zeugt von detailreicher Handwerkskunst und traditionellen Techniken. Diese einzigartig gestalteten Figuren verkörpern verschiedene Charaktere und Rollen und tragen so dazu bei, Persönlichkeit, Emotionen und kulturelle Symbolik innerhalb der Aufführung visuell zu vermitteln."},
                    {t:"8. Lackierung", d:"Die Puppen sind mit mehreren Lackschichten überzogen, was ihnen nicht nur ein glattes, glänzendes Aussehen verleiht, sondern sie auch während der Aufführungen vor Wasserschäden schützt. Diese Veredelungstechnik erhöht die Haltbarkeit und sorgt gleichzeitig für ein lebendiges, edles Erscheinungsbild, wodurch die Puppen auf der Bühne optisch besonders eindrucksvoll wirken."},
                    {t:"9. Aufführung im Wasser", d:"Die Aufführung wird von einem Team aus Puppenspielern aufgeführt, die hinter der Bühne eng zusammenarbeiten und die Bewegungen präzise synchronisieren, um die Puppen reibungslos zu führen. Diese Teamarbeit ermöglicht komplexe Szenen, dynamische Interaktionen und ein nahtloses Storytelling und stellt sowohl technisches Können als auch kollektive Kunstfertigkeit unter Beweis."},
                    {t:"10. Kulturerbe", d:"Das vietnamesische Wasserpuppentheater ist eine traditionelle Kunstform, die über Generationen weitergegeben wurde und Geschichten, Werte und Handwerkskunst aus dem ländlichen Leben bewahrt. Es spiegelt die Geschichte und Identität des Landes wider und macht jede Aufführung zu mehr als nur Unterhaltung – es ist ein bedeutungsvoller Ausdruck des vietnamesischen Kulturerbes."}
],

            label.innerText = langData[currentLang].sync;

            let progress = 0;
            const iv = setInterval(() => {
                progress += 5;
                bar.style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(iv);
                    setTimeout(() => {
                        syncScreen.style.display = 'none';
			document.querySelector('.nav-bar').style.display = 'flex';
			changeTab('trans');
                        startLiveFeed();
                    }, 400);
                }
            }, 100);
        }

        function startLiveFeed() {
    document.getElementById('trans-init').style.display = 'none';
    document.getElementById('live-content').style.display = 'block';

    const feed = document.getElementById('script-feed');
    feed.innerHTML = '';

    const script = langData[currentLang]?.script || langData.en.script;

    script.forEach((item, index) => {
        const el = document.createElement('div');
        el.id = 'line-' + index;
        el.className = item.s ? 'stage-note' : 'line';
        el.innerText = item.s || item.m;
        feed.appendChild(el);
    });

    const music = document.getElementById('bg-music');

    let fadeInterval;

function fadeTo(target, duration = 300) {
    if (!music) return;

    clearInterval(fadeInterval);

    const start = music.volume;
    const change = target - start;
    const steps = duration / 50;
    let currentStep = 0;

    fadeInterval = setInterval(() => {
        currentStep++;
        music.volume = start + (change * (currentStep / steps));

        if (currentStep >= steps) {
            music.volume = target;
            clearInterval(fadeInterval);
        }
    }, 50);
}

    let startTime = Date.now();
    let spoken = new Set();

    setInterval(() => {
        let elapsed = (Date.now() - startTime) / 1000;

        script.forEach((item, index) => {
            if (elapsed >= item.t) {
                const lineEl = document.getElementById('line-' + index);

                if (lineEl && !lineEl.classList.contains('active')) {
                    document.querySelectorAll('.line, .stage-note').forEach(l => l.classList.remove('active'));
                    lineEl.classList.add('active');

                    if (item.m && !spoken.has(index)) {
                        spoken.add(index);

                        window.speechSynthesis.cancel();

                        let speech = new SpeechSynthesisUtterance(item.m);

                        if (currentLang === 'zh') speech.lang = 'zh-CN';
                        else if (currentLang === 'vn') speech.lang = 'vi-VN';
                        else if (currentLang === 'ja') speech.lang = 'ja-JP';
                        else if (currentLang === 'ko') speech.lang = 'ko-KR';
                        else speech.lang = currentLang;

                        fadeTo(0.15);

			speech.onend = () => {
    			    fadeTo(0.3); // smooth restore
			};

                        window.speechSynthesis.speak(speech);
                    }
                }
            }
        });

    }, 500);
}


function expandImg(img) {
    const modal = document.getElementById('img-modal');
    const modalImg = document.getElementById('modal-img');

    modalImg.src = img.src;
    modal.style.display = 'flex';
}

document.getElementById('img-modal').onclick = function () {
    this.style.display = 'none';
};

    </script>

<audio id="bg-music" src="audio/puppet.mp3" loop></audio>

<div id="img-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:999999; justify-content:center; align-items:center;">
    <img id="modal-img" style="max-width:95%; max-height:95%; border-radius:10px;">
</div>
